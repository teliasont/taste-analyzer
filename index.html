<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Taste Analyzer</title>

    <!-- Our styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- Top banner with the app name -->
    <header>
      <h1>Music Taste Analyzer</h1>
    </header>

    <!-- Main content area — user input and results will live here -->
    <main>
      <section id="input-section">
        <h2>Add Your Songs</h2>

        <!-- Counter — updated by script.js whenever the list changes -->
        <p id="song-count"></p>

        <!-- Input form — title, artist, and add button -->
        <div id="song-form">
          <label for="input-title">Song title</label>
          <input type="text" id="input-title" placeholder="e.g. Bohemian Rhapsody" />

          <label for="input-artist">Artist</label>
          <input type="text" id="input-artist" placeholder="e.g. Queen" />

          <button id="btn-add" type="button">Add Song</button>
        </div>

        <!-- Song list — emptied and rebuilt by renderList() on every change -->
        <ul id="song-list"></ul>

        <!-- Disabled until 6 songs are added; enabled state managed by script.js -->
        <button id="btn-start" type="button" disabled>Start Analysis</button>
      </section>

      <section id="results-section">
        <!-- Comparison results will be displayed here -->
        <p>Results section placeholder</p>
      </section>
    </main>

    <!-- Our JavaScript — loaded at the bottom so the HTML is ready first -->
    <script src="script.js"></script>
  </body>
</html>
