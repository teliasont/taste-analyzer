<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Taste Analyzer</title>

    <!-- Our styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- Top banner with the app name -->
    <header>
      <h1>Music Taste Analyzer</h1>
    </header>

    <!-- Main content area — user input and results will live here -->
    <main>
      <section id="input-section">
        <h2>Add Your Songs</h2>

        <!-- Counter — updated by script.js whenever the list changes -->
        <p id="song-count"></p>

        <!-- Input form — title, artist, and add button -->
        <div id="song-form">
          <label for="input-title">Song title</label>
          <input type="text" id="input-title" placeholder="e.g. Bohemian Rhapsody" />

          <label for="input-artist">Artist</label>
          <input type="text" id="input-artist" placeholder="e.g. Queen" />

          <button id="btn-add" type="button">Add Song</button>
        </div>

        <!-- "Your List" section label with a green rule beneath -->
        <p id="list-label">Your List</p>

        <!-- Song list — emptied and rebuilt by renderList() on every change -->
        <ul id="song-list"></ul>

        <!-- Disabled until 6 songs are added; enabled state managed by script.js -->
        <button id="btn-start" type="button" disabled>Start Analysis</button>
      </section>

      <!-- Comparison screen — hidden until Start is clicked -->
      <section id="comparison-section" hidden>

        <!-- Progress bar: the inner div's width grows as rounds complete -->
        <div id="progress-bar-container">
          <div id="progress-bar"></div>
        </div>

        <!-- Round counter: "Round X of Y" -->
        <p id="round-counter"></p>

        <!-- Question area: shows "Finding a connection..." during loading,
             then the AI-generated question once the fetch completes -->
        <div id="question-area">
          <p id="question-text"></p>
        </div>

        <!-- Reasoning toggle — hidden during loading, shown once the question arrives.
             Only displayed when the model returned a non-empty reasoning field. -->
        <button id="btn-reasoning" type="button" hidden>See reasoning</button>

        <!-- Reasoning text — hidden by default, toggled by the button above -->
        <p id="reasoning-text" hidden></p>

        <!-- Song cards: each is a <button> so the entire card is clickable.
             Disabled during the loading state, enabled once the question arrives. -->
        <div id="song-cards">
          <button class="song-card" id="card-a" type="button" disabled>
            <p class="card-title" id="card-a-title"></p>
            <p class="card-artist" id="card-a-artist"></p>
          </button>
          <button class="song-card" id="card-b" type="button" disabled>
            <p class="card-title" id="card-b-title"></p>
            <p class="card-artist" id="card-b-artist"></p>
          </button>
        </div>

        <!-- Undo button — hidden until the first choice is recorded.
             Lets the user replay the previous pairing with a fresh AI question. -->
        <button id="btn-undo" type="button" hidden>&#8592; Undo last choice</button>

      </section>

      <!-- Results screen — hidden until all comparison rounds are complete -->
      <section id="results-section" hidden>

        <!-- Shown while the reflection is being generated, swapped out when done -->
        <p id="reflection-status">Reading your choices...</p>

        <!-- The AI-generated reflection; hidden until the fetch completes -->
        <p id="reflection-text" hidden></p>

        <button id="btn-restart" type="button">Start Over</button>

      </section>
    </main>

    <!-- type="module" enables ES module imports (e.g. config.js).
         Modules are deferred automatically, so the script still runs after
         the HTML is parsed — same behaviour as before, no load-order change.
         Note: modules require a real HTTP server; file:// won't work. -->
    <script type="module" src="script.js"></script>
  </body>
</html>
